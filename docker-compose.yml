version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: bimanyaya_redis
    restart: always
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    container_name: bimanyaya_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  go-api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: bimanyaya_go_api
    restart: always
    depends_on:
      - redis
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PORT=8080
      - REDIS_URL=redis:6379
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - S3_BUCKET_NAME=bimanyaya-docs
      - AI_WORKER_URL=http://ai-worker:8000
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - CLERK_JWT_ISSUER=${CLERK_JWT_ISSUER}
      - CLERK_JWKS_URL=${CLERK_JWKS_URL}
      - CONVEX_URL=${CONVEX_URL}
      - CONVEX_DEPLOY_KEY=${CONVEX_DEPLOY_KEY}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      - ENV=${ENV:-development}

  ai-worker:
    build:
      context: ./apps/ai-worker
      dockerfile: Dockerfile
    container_name: bimanyaya_ai_worker
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./apps/ai-worker/app:/app/app
      - .:/workspace
    environment:
      - PORT=8000
      - SARVAM_API_KEY=${SARVAM_API_KEY}
      - ENV=${ENV:-development}

volumes:
  minio_data:

